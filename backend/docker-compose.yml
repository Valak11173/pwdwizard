version: "3.8"

services: 
  app:
    build: .
    env_file:
      - .env
    volumes:
      - .:/usr/src/app
    ports: 
      - "8000:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    
db:
    image: mysql:8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: pwdwizard
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
